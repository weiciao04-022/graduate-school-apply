        const { useState, useEffect, useMemo } = React;

        // 輔助函數：格式化文字，將網址轉換為可點擊連結，並保留換行符號
        const formatCellText = (text) => {
            if (!text) return '';
            
            // 處理換行
            const parts = text.split('\n');
            const urlRegex = /(https?:\/\/[^\s]+)/g;

            return parts.map((part, index) => {
                // 如果這一行包含網址
                if (urlRegex.test(part)) {
                    const htmlContent = part.replace(urlRegex, '<a href="$1" target="_blank" rel="noopener noreferrer" class="text-indigo-600 hover:text-indigo-800 hover:underline font-medium break-all">$1</a>');
                    return (
                        <span key={index}>
                            <span dangerouslySetInnerHTML={{ __html: htmlContent }} />
                            {index < parts.length - 1 && <br />}
                        </span>
                    );
                }
                // 純文字
                return (
                    <span key={index}>
                        {part}
                        {index < parts.length - 1 && <br />}
                    </span>
                );
            });
        };

        // 元件：通用資料表格
        const DataTable = ({ data, title }) => {
            if (!data || data.length === 0) return <div className="p-8 text-center text-gray-500">無資料</div>;
            
            const headers = Object.keys(data[0]);
            
            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="px-6 py-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                        <h2 className="text-lg font-bold text-slate-800">{title}</h2>
                        <span className="text-xs font-medium bg-slate-200 text-slate-600 px-2 py-1 rounded-full">共 {data.length} 筆資料</span>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-left border-collapse">
                            <thead>
                                <tr>
                                    {headers.map((header, i) => (
                                        <th key={i} className="px-4 py-3 bg-slate-50 border-b border-slate-200 text-sm font-semibold text-slate-600 whitespace-nowrap">
                                            {header}
                                        </th>
                                    ))}
                                </tr>
                            </thead>
                            <tbody>
                                {data.map((row, i) => (
                                    <tr key={i} className="hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-0">
                                        {headers.map((header, j) => (
                                            <td key={j} className="px-4 py-3 text-sm text-slate-700 min-w-[120px]">
                                                {formatCellText(row[header])}
                                            </td>
                                        ))}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // 元件：每日執行版 (核心功能)
        const DailyExecutionView = ({ data }) => {
            const [completedTasks, setCompletedTasks] = useState({});
            
            // 從 LocalStorage 讀取進度
            useEffect(() => {
                const saved = localStorage.getItem('grad_app_tasks');
                if (saved) {
                    try { setCompletedTasks(JSON.parse(saved)); } catch (e) {}
                }
            }, []);

            // 儲存進度到 LocalStorage
            const toggleTask = (date, section) => {
                const key = `${date}_${section}`;
                const newStatus = { ...completedTasks, [key]: !completedTasks[key] };
                setCompletedTasks(newStatus);
                localStorage.setItem('grad_app_tasks', JSON.stringify(newStatus));
            };

            // 取得台灣時間的今天日期 (格式 YYYY-MM-DD)
            const todayStr = useMemo(() => {
                // 使用 Intl.DateTimeFormat 確保在任何時區抓出來都是正確的日期
                const options = { timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit' };
                const formatter = new Intl.DateTimeFormat('en-CA', options); // en-CA 會輸出 YYYY-MM-DD
                return formatter.format(new Date()); 
            }, []);

            // 尋找今天的任務
            const todayTaskIndex = data.findIndex(row => row['日期'] === todayStr);
            const todayTask = todayTaskIndex !== -1 ? data[todayTaskIndex] : null;

            // 自動滾動到今天的任務 (如果在列表中的話)
            useEffect(() => {
                if (todayTask) {
                    setTimeout(() => {
                        const el = document.getElementById('today-card');
                        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 500);
                }
            }, [todayTask]);

                                </h2>
                                <p className="text-indigo-600/80 mt-1 font-medium">
                                    {todayStr} {todayTask ? `| ${todayTask['星期']} | ${todayTask['週次']}週 | ${todayTask['階段']}` : ''}
                                </p>
                            </div>
                            {todayTask && (
                                <div className="mt-4 md:mt-0 flex gap-4 text-sm bg-white/60 px-4 py-2 rounded-xl backdrop-blur-sm">
                                    <div className="text-center">
                                        <div className="text-slate-500 text-xs">總預估</div>
                                        <div className="font-bold text-indigo-700">{todayTask['總預估分鐘'] || '0'} min</div>
                                    </div>
                                    <div className="w-px bg-slate-200"></div>
                                    <div className="text-center">
                                        <div className="text-slate-500 text-xs">IELTS 主軸</div>
                                        <div className="font-bold text-slate-700">{todayTask['今日 IELTS 主軸']}</div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {todayTask ? (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                {/* A 段 */}
                                <div className="bg-white rounded-xl p-5 shadow-sm border border-slate-100 relative overflow-hidden group">
                                    <div className="absolute top-0 left-0 w-1 h-full bg-red-400"></div>
                                    <div className="flex justify-between items-start mb-3">
                                        <h3 className="font-bold text-slate-800 text-lg flex items-center gap-2">
                                            A 早段深度
                                        </h3>
                                        <span className="bg-red-50 text-red-600 text-xs px-2 py-1 rounded font-bold">{todayTask['A段分鐘']}m</span>
                                    </div>
                                    <div className="text-sm font-semibold text-red-500 mb-2">{todayTask['A 早段深度工作（最重要）']}</div>
                                    <div className="text-sm text-slate-600 space-y-1 mb-4">
                                        {formatCellText(todayTask['A段具體步驟'])}
                                    </div>
                                    <button 
                                        onClick={() => toggleTask(todayStr, 'A')}
                                        className={`w-full py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 ${completedTasks[`${todayStr}_A`] ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                                        <i className={`ph-bold ${completedTasks[`${todayStr}_A`] ? 'ph-check-circle' : 'ph-circle'}`}></i>
                                        {completedTasks[`${todayStr}_A`] ? 'A段已完成' : '標記 A段 完成'}
                                    </button>
                                </div>

                                {/* B 段 */}
                                <div className="bg-white rounded-xl p-5 shadow-sm border border-slate-100 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-1 h-full bg-blue-400"></div>
                                    <div className="flex justify-between items-start mb-3">
                                        <h3 className="font-bold text-slate-800 text-lg flex items-center gap-2">
                                            B 下午訓練
                                        </h3>
                                        <span className="bg-blue-50 text-blue-600 text-xs px-2 py-1 rounded font-bold">{todayTask['B段分鐘']}m</span>
                                    </div>
                                    <div className="text-sm font-semibold text-blue-500 mb-2">{todayTask['B 下午訓練']}</div>
                                    <div className="text-sm text-slate-600 space-y-1 mb-4">
                                        {formatCellText(todayTask['B段具體步驟'])}
                                    </div>
                                    <button 
                                        onClick={() => toggleTask(todayStr, 'B')}
                                        className={`w-full py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 ${completedTasks[`${todayStr}_B`] ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                                        <i className={`ph-bold ${completedTasks[`${todayStr}_B`] ? 'ph-check-circle' : 'ph-circle'}`}></i>
                                        {completedTasks[`${todayStr}_B`] ? 'B段已完成' : '標記 B段 完成'}
                                    </button>
                                </div>

                                {/* C 段 */}
                                <div className="bg-white rounded-xl p-5 shadow-sm border border-slate-100 relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-1 h-full bg-indigo-400"></div>
                                    <div className="flex justify-between items-start mb-3">
                                        <h3 className="font-bold text-slate-800 text-lg flex items-center gap-2">
                                            C 晚間整理
                                        </h3>
                                        <span className="bg-indigo-50 text-indigo-600 text-xs px-2 py-1 rounded font-bold">{todayTask['C段分鐘']}m</span>
                                    </div>
                                    <div className="text-sm font-semibold text-indigo-500 mb-2">{todayTask['C 晚間整理／寫作']}</div>
                                    <div className="text-sm text-slate-600 space-y-1 mb-4">
                                        {formatCellText(todayTask['C段具體步驟'])}
                                    </div>
                                    <button 
                                        onClick={() => toggleTask(todayStr, 'C')}
                                        className={`w-full py-2 rounded-lg text-sm font-bold transition-all flex items-center justify-center gap-2 ${completedTasks[`${todayStr}_C`] ? 'bg-green-100 text-green-700 border border-green-200' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>
                                        <i className={`ph-bold ${completedTasks[`${todayStr}_C`] ? 'ph-check-circle' : 'ph-circle'}`}></i>
                                        {completedTasks[`${todayStr}_C`] ? 'C段已完成' : '標記 C段 完成'}
                                    </button>
                                </div>

                                {/* 最低產出 & 備註 (跨滿全寬) */}
                                <div className="lg:col-span-3 bg-indigo-900/5 rounded-xl p-4 flex flex-col md:flex-row gap-4 border border-indigo-100">
                                    <div className="flex-1">
                                        <div className="text-xs text-indigo-800 font-bold mb-1">🎯 今日最低產出</div>
                                        <div className="text-sm text-slate-700 font-medium">{todayTask['今日最低產出']}</div>
                                    </div>
                                    <div className="hidden md:block w-px bg-indigo-200"></div>
                                    <div className="flex-1">
                                        <div className="text-xs text-indigo-800 font-bold mb-1">✅ 今日完成定義</div>
                                        <div className="text-sm text-slate-700">{todayTask['今日完成定義']}</div>
                                    </div>
                                    {todayTask['需上網查核 / 已代查'] && (
                                        <>
                                            <div className="hidden md:block w-px bg-indigo-200"></div>
                                            <div className="flex-1">
                                                <div className="text-xs text-indigo-800 font-bold mb-1">🔗 查核 / 參考</div>
                                                <div className="text-sm text-slate-700">{formatCellText(todayTask['需上網查核 / 已代查'])}</div>
                                            </div>
                                        </>
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="text-center py-10 text-slate-500">
                                喔不，今天 ({todayStr}) 似乎沒有排定在計畫表格中。<br/>您可以往下看所有日程，或點擊上方分頁查看其他資訊。
                            </div>
                        )}
                    </div>

                    {/* 所有日程列表 */}
                    <div className="mt-8">
                        <h3 className="text-xl font-bold text-slate-800 mb-4 flex items-center gap-2">
                            <i className="ph-fill ph-list-dashes text-indigo-500"></i> 所有日程表
                        </h3>
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr>
                                            <th className="px-4 py-3 bg-slate-50 border-b border-slate-200 text-sm font-semibold text-slate-600 whitespace-nowrap">日期</th>
                                            <th className="px-4 py-3 bg-slate-50 border-b border-slate-200 text-sm font-semibold text-slate-600 whitespace-nowrap">階段</th>
                                            <th className="px-4 py-3 bg-slate-50 border-b border-slate-200 text-sm font-semibold text-slate-600 min-w-[200px]">A 早段 (最重要)</th>
                                            <th className="px-4 py-3 bg-slate-50 border-b border-slate-200 text-sm font-semibold text-slate-600 min-w-[200px]">B 下午</th>
                                            <th className="px-4 py-3 bg-slate-50 border-b border-slate-200 text-sm font-semibold text-slate-600 min-w-[200px]">C 晚間</th>
                                            <th className="px-4 py-3 bg-slate-50 border-b border-slate-200 text-sm font-semibold text-slate-600">最低產出</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {data.map((row, i) => {
                                            const isToday = row['日期'] === todayStr;
                                            return (
                                                <tr key={i} className={`transition-colors border-b border-slate-100 last:border-0 ${isToday ? 'bg-indigo-50/50 hover:bg-indigo-50' : 'hover:bg-slate-50'}`}>
                                                    <td className="px-4 py-3 text-sm whitespace-nowrap">
                                                        <div className={`font-bold ${isToday ? 'text-indigo-600' : 'text-slate-700'}`}>{row['日期']}</div>
                                                        <div className="text-xs text-slate-400">{row['星期']}</div>
                                                        {isToday && <span className="mt-1 inline-block bg-indigo-100 text-indigo-700 text-[10px] px-2 py-0.5 rounded font-bold">今天</span>}
                                                    </td>
                                                    <td className="px-4 py-3 text-xs text-slate-600 font-medium">{row['階段']}</td>
                                                    <td className="px-4 py-3 text-sm">
                                                        <div className="font-semibold text-slate-800 mb-1">{row['A 早段深度工作（最重要）']}</div>
                                                        <div className="text-xs text-slate-500 truncate max-w-xs" title={row['A段具體步驟']}>{row['A段具體步驟']}</div>
                                                    </td>
                                                    <td className="px-4 py-3 text-sm">
                                                        <div className="font-medium text-slate-700 mb-1">{row['B 下午訓練']}</div>
                                                        <div className="text-xs text-slate-500 truncate max-w-xs" title={row['B段具體步驟']}>{row['B段具體步驟']}</div>
                                                    </td>
                                                    <td className="px-4 py-3 text-sm">
                                                        <div className="font-medium text-slate-700 mb-1">{row['C 晚間整理／寫作']}</div>
                                                        <div className="text-xs text-slate-500 truncate max-w-xs" title={row['C段具體步驟']}>{row['C段具體步驟']}</div>
                                                    </td>
                                                    <td className="px-4 py-3 text-sm text-slate-700 font-medium">
                                                        {row['今日最低產出']}
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 元件：主應用程式
        const App = () => {
            const [activeTab, setActiveTab] = useState('daily');
            const [data, setData] = useState({
                daily: [],
                schools: [],
                ielts: [],
                docs: [],
                milestones: []
            });
            const [loading, setLoading] = useState(true);

            // 解析所有 CSV
            useEffect(() => {
                const parseCSV = (csvString) => {
                    return new Promise((resolve) => {
                        Papa.parse(csvString, {
                            header: true,
                            skipEmptyLines: true,
                            complete: (results) => resolve(results.data)
                        });
                    });
                };

                Promise.all([
                    parseCSV(rawDailyData),
                    parseCSV(rawSchoolsData),
                    parseCSV(rawIeltsData),
                    parseCSV(rawDocsData),
                    parseCSV(rawMilestoneData)
                ]).then(([daily, schools, ielts, docs, milestones]) => {
                    setData({ daily, schools, ielts, docs, milestones });
                    setLoading(false);
                });
            }, []);

            const tabs = [
                { id: 'daily', name: '🔥 每日執行版', icon: 'ph-calendar-check' },
                { id: 'schools', name: '🏫 學校清單', icon: 'ph-buildings' },
                { id: 'ielts', name: '📚 IELTS資源', icon: 'ph-books' },
                { id: 'docs', name: '📁 文件追蹤', icon: 'ph-files' },
                { id: 'milestones', name: '⛳ 週里程碑', icon: 'ph-flag-banner' }
            ];

            if (loading) return <div className="min-h-screen flex items-center justify-center text-indigo-600 font-bold text-xl">資料載入中...</div>;

            return (
                <div className="flex flex-col md:flex-row min-h-screen">
                    {/* 左側導覽列 */}
                    <div className="w-full md:w-64 bg-slate-900 text-white flex flex-col md:fixed h-auto md:h-screen z-10 shadow-xl">
                        <div className="p-6 pb-4 border-b border-slate-800">
                            <h1 className="text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-300">
                                GradApp 2026
                            </h1>
                            <p className="text-xs text-slate-400 mt-2 font-medium">研究所申請戰情室</p>
                        </div>
                        <div className="flex-1 overflow-y-auto py-4 px-3 flex flex-row md:flex-col gap-1 overflow-x-auto no-scrollbar">
                            {tabs.map(tab => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-medium transition-all whitespace-nowrap md:whitespace-normal
                                        ${activeTab === tab.id 
                                            ? 'bg-indigo-600 text-white shadow-md' 
                                            : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200'}`}
                                >
                                    <i className={`ph-fill ${tab.icon} text-lg ${activeTab === tab.id ? 'text-indigo-200' : ''}`}></i>
                                    {tab.name}
                                </button>
                            ))}
                        </div>
                        <div className="p-6 border-t border-slate-800 text-xs text-slate-500 hidden md:block">
                            <p>設計原則：</p>
                            <p className="mt-1">1. A段只做最重要一件事</p>
                            <p>2. 每天都要留下實體檔案</p>
                            <p>3. 以官方公告為最高準則</p>
                        </div>
                    </div>

                    {/* 右側主要內容區 */}
                    <div className="flex-1 md:ml-64 p-4 md:p-8 w-full max-w-7xl mx-auto">
                        {activeTab === 'daily' && <DailyExecutionView data={data.daily} />}
                        {activeTab === 'schools' && <DataTable data={data.schools} title="目標學校與系所清單" />}
                        {activeTab === 'ielts' && <DataTable data={data.ielts} title="IELTS 官方與準備資源" />}
                        {activeTab === 'docs' && <DataTable data={data.docs} title="申請文件進度追蹤" />}
                        {activeTab === 'milestones' && <DataTable data={data.milestones} title="每週階段與里程碑" />}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
